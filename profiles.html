<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 관리 - 더치페이 계산기</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <button onclick="goBack()" class="back-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M19 12H5M12 19L5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <h1>프로필 관리</h1>
        </header>

        <!-- 새 프로필 추가 -->
        <section class="profile-add-section">
            <h2>새 프로필 추가</h2>
            <div class="input-row">
                <input type="text" id="newProfileName" placeholder="프로필 이름을 입력하세요" maxlength="20">
                <button onclick="addProfile()" class="btn-primary">추가</button>
            </div>
        </section>

        <!-- 기존 프로필 목록 -->
        <section class="profile-list-section">
            <h2>기존 프로필</h2>
            <div id="profilesList" class="profiles-grid">
                <!-- 프로필 목록이 여기에 표시됩니다 -->
            </div>
        </section>
    </div>

    <!-- 확인 모달 -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content confirm-modal">
            <div class="modal-header">
                <h3 id="confirmTitle">확인</h3>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">정말로 실행하시겠습니까?</p>
            </div>
            <div class="modal-footer">
                <button onclick="confirmAction()" class="btn-danger">확인</button>
                <button onclick="closeConfirmModal()" class="btn-secondary">취소</button>
            </div>
        </div>
    </div>

    <script src="js/profiles.js"></script>
</body>
</html>
