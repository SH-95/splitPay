<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더치페이 계산기</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 헤더 -->
        <header class="app-header">
            <div class="header-content">
                <h1 data-i18n="appTitle">더치페이</h1>
                <div class="header-controls">
                    <!-- 언어 전환 버튼 -->
                    <div class="language-switcher">
                        <button id="langKo" onclick="changeLanguage('ko')" class="lang-btn active">🇰🇷</button>
                        <button id="langJa" onclick="changeLanguage('ja')" class="lang-btn">🇯🇵</button>
                    </div>
                    
                    <select id="profileSelect" class="profile-select" onchange="changeProfile()">
                        <!-- 프로필 목록이 여기에 채워집니다 -->
                    </select>
                    
                    <button onclick="goToProfileManagement()" class="btn-icon" data-i18n-title="profileManagement">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- 메인 콘텐츠 -->
        <main class="app-main">
            <!-- 카테고리 선택 -->
            <section class="category-section">
                <div class="section-header">
                    <div class="category-management">
                        <select id="categorySelect" class="category-select" onchange="changeCategory()">
                            <option value="default" data-i18n="defaultCategory">기본 카테고리</option>
                        </select>
                        <div class="category-actions">
                            <button onclick="editCurrentCategory()" class="btn-edit-category" title="카테고리 수정">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="m18.5 2.5 a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <button onclick="deleteCurrentCategory()" class="btn-delete-category" title="카테고리 삭제">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                    <polyline points="3,6 5,6 21,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="m19,6v14a2,2 0 0,1 -2,2H7a2,2 0 0,1 -2,-2V6m3,0V4a2,2 0 0,1 2,-2h4a2,2 0 0,1 2,2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button onclick="showAddCategory()" class="btn-add" data-i18n="newCategory">+ 새 카테고리</button>
                </div>
                <div id="addCategoryForm" class="add-form" style="display: none;">
                    <input type="text" id="newCategoryName" data-i18n="categoryName" placeholder="카테고리 이름" maxlength="20">
                    <div class="form-actions">
                        <button onclick="addCategory()" class="btn-primary" data-i18n="addCategory">추가</button>
                        <button onclick="hideAddCategory()" class="btn-secondary" data-i18n="cancel">취소</button>
                    </div>
                </div>
                <div id="editCategoryForm" class="add-form" style="display: none;">
                    <input type="text" id="editCategoryName" data-i18n="categoryName" placeholder="카테고리 이름" maxlength="20">
                    <div class="form-actions">
                        <button onclick="saveEditCategory()" class="btn-primary" data-i18n="save">저장</button>
                        <button onclick="hideEditCategory()" class="btn-secondary" data-i18n="cancel">취소</button>
                    </div>
                </div>
            </section>

            <!-- 참가자 관리 -->
            <section class="participants-section">
                <h2 data-i18n="participants">참가자</h2>
                <div class="add-form">
                    <input type="text" id="participantName" data-i18n="addParticipant" placeholder="이름을 입력하세요" maxlength="15">
                    <button onclick="addParticipant()" class="btn-primary" data-i18n="addButton">추가</button>
                </div>
                <div id="participantsList" class="tags-container">
                    <!-- 참가자 목록 -->
                </div>
            </section>

            <!-- 지출 추가 -->
            <section class="expense-section">
                <h2 data-i18n="addExpense">지출 추가</h2>
                <div class="expense-form">
                    <input type="text" id="expenseName" data-i18n="expenseName" placeholder="항목 이름" maxlength="30">
                    <input type="number" id="expenseAmount" data-i18n="amount" placeholder="금액" min="0">
                    <select id="expensePayer" class="payer-select">
                        <option value="" data-i18n="payer">지불한 사람</option>
                    </select>
                    <textarea id="expenseMemo" data-i18n="memo" placeholder="메모 (선택사항)" rows="2" maxlength="100"></textarea>
                    <button onclick="addExpense()" class="btn-primary btn-full" data-i18n="addExpenseButton">지출 추가</button>
                </div>
            </section>

            <!-- 지출 목록 -->
            <section class="expense-list-section">
                <div class="section-header">
                    <h2 data-i18n="expenseList">지출 내역</h2>
                    <button onclick="resetCurrentCategory()" class="btn-reset" data-i18n="reset">초기화</button>
                </div>
                <div id="expensesList" class="expenses-container">
                    <!-- 지출 목록 -->
                </div>
            </section>

            <!-- 계산 결과 -->
            <section class="results-section">
                <div class="summary-card">
                    <div class="summary-row">
                        <span data-i18n="totalAmount">총 금액</span>
                        <span id="totalAmount" class="amount-text">¥0</span>
                    </div>
                    <div class="summary-row">
                        <span data-i18n="participantCount">참가자</span>
                        <span id="participantCountText">0<span data-i18n="people">명</span></span>
                    </div>
                    <div class="summary-row highlight">
                        <span data-i18n="perPersonAmount">1인당 부담</span>
                        <span id="perPersonAmount" class="amount-text">¥0</span>
                    </div>
                </div>

                <!-- 정산 결과 -->
                <div class="settlement-card">
                    <h3 data-i18n="settlementResults">정산 결과</h3>
                    <div id="settlementResults" class="settlement-container">
                        <!-- 정산 결과 -->
                    </div>
                    <div id="paypayActions" class="paypay-section" style="display: none;">
                        <button onclick="openPayPay()" class="btn-paypay">
                            <span class="paypay-icon">💰</span>
                            <span data-i18n="sendWithPayPay">PayPay로 보내기</span>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 지출 수정 모달 -->
    <div id="expenseModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="editExpense">지출 수정</h3>
                <button onclick="closeExpenseModal()" class="modal-close">×</button>
            </div>
            <form class="modal-form">
                <input type="text" id="editExpenseName" data-i18n="expenseName" placeholder="항목 이름" class="form-input">
                <input type="number" id="editExpenseAmount" data-i18n="amount" placeholder="금액" min="0" class="form-input">
                <select id="editExpensePayer" class="form-input">
                    <!-- 참가자 목록 -->
                </select>
                <textarea id="editExpenseMemo" data-i18n="memo" placeholder="메모" rows="3" class="form-input"></textarea>
                <div class="modal-actions">
                    <button type="button" onclick="saveExpenseChanges()" class="btn-primary" data-i18n="save">저장</button>
                    <button type="button" onclick="closeExpenseModal()" class="btn-secondary" data-i18n="cancel">취소</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 확인 모달 -->
    <div id="confirmModal" class="modal" style="display: none;">
        <div class="modal-content confirm-modal">
            <div class="modal-body">
                <h3 id="confirmTitle" data-i18n="confirm">확인</h3>
                <p id="confirmMessage">정말로 실행하시겠습니까?</p>
                <div class="modal-actions">
                    <button onclick="confirmAction()" class="btn-danger" data-i18n="confirm">확인</button>
                    <button onclick="closeConfirmModal()" class="btn-secondary" data-i18n="cancel">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
