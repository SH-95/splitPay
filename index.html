<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>더치페이</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">

        <!-- 헤더 -->
        <header class="app-header">
            <div class="header-content">
                <div class="header-left">
                    <div class="app-logo">
                        <span class="logo-icon">💸</span>
                        <h1 data-i18n="appTitle">더치페이</h1>
                    </div>
                </div>
                <div class="header-controls">
                    <div class="language-switcher">
                        <button id="langKo" onclick="changeLanguage('ko')" class="lang-btn active">KO</button>
                        <button id="langJa" onclick="changeLanguage('ja')" class="lang-btn">JA</button>
                    </div>
                    <select id="profileSelect" class="profile-select" onchange="changeProfile()"></select>
                    <button onclick="goToProfileManagement()" class="btn-icon-header" title="프로필 관리">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- 탭 콘텐츠 영역 -->
        <main class="app-main">

            <!-- ===== TAB 1: 참가자 ===== -->
            <div id="tab-participants" class="tab-panel active">

                <!-- 카테고리 섹션 -->
                <div class="panel-card category-card">
                    <div class="category-row">
                        <div class="category-select-wrap">
                            <select id="categorySelect" class="category-select" onchange="changeCategory()">
                                <option value="default" data-i18n="defaultCategory">기본 카테고리</option>
                            </select>
                            <div class="category-icon-btns">
                                <button onclick="editCurrentCategory()" class="cat-action-btn edit-cat-btn" title="수정">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </button>
                                <button onclick="deleteCurrentCategory()" class="cat-action-btn delete-cat-btn" title="삭제">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3,6 5,6 21,6"/>
                                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <button onclick="showAddCategory()" class="btn-new-category" data-i18n="newCategory">+ 새 카테고리</button>
                    </div>

                    <!-- 카테고리 추가 폼 -->
                    <div id="addCategoryForm" class="inline-form" style="display:none;">
                        <input type="text" id="newCategoryName" data-i18n="categoryName" placeholder="카테고리 이름" maxlength="20" class="inline-input">
                        <button onclick="addCategory()" class="btn-sm-primary" data-i18n="addCategory">추가</button>
                        <button onclick="hideAddCategory()" class="btn-sm-secondary" data-i18n="cancel">취소</button>
                    </div>

                    <!-- 카테고리 수정 폼 -->
                    <div id="editCategoryForm" class="inline-form" style="display:none;">
                        <input type="text" id="editCategoryName" data-i18n="categoryName" placeholder="카테고리 이름" maxlength="20" class="inline-input">
                        <button onclick="saveEditCategory()" class="btn-sm-primary" data-i18n="save">저장</button>
                        <button onclick="hideEditCategory()" class="btn-sm-secondary" data-i18n="cancel">취소</button>
                    </div>
                </div>

                <!-- 참가자 추가 -->
                <div class="panel-card">
                    <div class="card-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                            <path d="M16 3.13a4 4 0 010 7.75"/>
                        </svg>
                        <span data-i18n="participants">참가자</span>
                    </div>
                    <div class="participant-input-row">
                        <input type="text" id="participantName" data-i18n="addParticipant" placeholder="이름을 입력하세요" maxlength="15" class="field-input">
                        <button onclick="addParticipant()" class="btn-add-person">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </div>

                    <!-- 참가자 칩 목록 -->
                    <div id="participantsList" class="participants-chips">
                        <!-- JS가 채웁니다 -->
                    </div>
                </div>

            </div>

            <!-- ===== TAB 2: 지출 ===== -->
            <div id="tab-expenses" class="tab-panel">

                <!-- 지출 추가 폼 -->
                <div class="panel-card">
                    <div class="card-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                        </svg>
                        <span data-i18n="addExpense">지출 추가</span>
                    </div>
                    <div class="expense-form">
                        <input type="text" id="expenseName" data-i18n="expenseName" placeholder="항목 이름" maxlength="30" class="field-input">
                        <div class="expense-row-two">
                            <input type="number" id="expenseAmount" data-i18n="amount" placeholder="금액" min="0" class="field-input amount-input">
                            <select id="expensePayer" class="field-input payer-select">
                                <option value="" data-i18n="payer">지불한 사람</option>
                            </select>
                        </div>
                        <textarea id="expenseMemo" data-i18n="memo" placeholder="메모 (선택사항)" rows="2" maxlength="100" class="field-input field-textarea"></textarea>
                        <button onclick="addExpense()" class="btn-add-expense">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            <span data-i18n="addExpenseButton">지출 추가</span>
                        </button>
                    </div>
                </div>

                <!-- 지출 목록 -->
                <div class="panel-card">
                    <div class="card-title-row">
                        <div class="card-title">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="8" y1="6" x2="21" y2="6"/>
                                <line x1="8" y1="12" x2="21" y2="12"/>
                                <line x1="8" y1="18" x2="21" y2="18"/>
                                <line x1="3" y1="6" x2="3.01" y2="6"/>
                                <line x1="3" y1="12" x2="3.01" y2="12"/>
                                <line x1="3" y1="18" x2="3.01" y2="18"/>
                            </svg>
                            <span data-i18n="expenseList">지출 내역</span>
                        </div>
                        <button onclick="resetCurrentCategory()" class="btn-reset-small" data-i18n="reset">초기화</button>
                    </div>
                    <div id="expensesList" class="expenses-list">
                        <!-- JS가 채웁니다 -->
                    </div>
                </div>

            </div>

            <!-- ===== TAB 3: 정산 ===== -->
            <div id="tab-settlement" class="tab-panel">

                <!-- 요약 카드 3개 -->
                <div class="summary-stats-row">
                    <div class="stat-card">
                        <div class="stat-label" data-i18n="totalAmount">총 금액</div>
                        <div id="totalAmount" class="stat-value">¥0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label" data-i18n="participantCount">참가자</div>
                        <div id="participantCountText" class="stat-value">0<span data-i18n="people">명</span></div>
                    </div>
                    <div class="stat-card stat-card-accent">
                        <div class="stat-label" data-i18n="perPersonAmount">1인당 부담</div>
                        <div id="perPersonAmount" class="stat-value">¥0</div>
                    </div>
                </div>

                <!-- 정산 결과 -->
                <div class="panel-card">
                    <div class="card-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                        <span data-i18n="settlementResults">정산 결과</span>
                    </div>
                    <div id="settlementResults" class="settlement-list">
                        <!-- JS가 채웁니다 -->
                    </div>
                    <div id="paypayActions" class="paypay-section" style="display:none;">
                        <button onclick="openPayPay()" class="btn-paypay">
                            <span class="paypay-icon">💰</span>
                            <span data-i18n="sendWithPayPay">PayPay로 보내기</span>
                        </button>
                    </div>
                </div>

            </div>

        </main>

        <!-- 하단 탭바 -->
        <nav class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('participants')" id="tabBtn-participants">
                <span class="tab-icon">👥</span>
                <span class="tab-label" data-i18n="participants">참가자</span>
                <span id="badge-participants" class="tab-badge" style="display:none;"></span>
            </button>
            <button class="tab-btn" onclick="switchTab('expenses')" id="tabBtn-expenses">
                <span class="tab-icon">💰</span>
                <span class="tab-label" data-i18n="addExpense">지출</span>
                <span id="badge-expenses" class="tab-badge" style="display:none;"></span>
            </button>
            <button class="tab-btn" onclick="switchTab('settlement')" id="tabBtn-settlement">
                <span class="tab-icon">📊</span>
                <span class="tab-label" data-i18n="settlementResults">정산</span>
                <span id="badge-settlement" class="tab-badge" style="display:none;"></span>
            </button>
        </nav>

    </div>

    <!-- 지출 수정 모달 -->
    <div id="expenseModal" class="modal" style="display:none;">
        <div class="modal-backdrop" onclick="closeExpenseModal()"></div>
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h3 data-i18n="editExpense">지출 수정</h3>
                <button onclick="closeExpenseModal()" class="modal-close-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="modal-form">
                    <div class="form-group">
                        <label class="form-label" data-i18n="expenseName">항목 이름</label>
                        <input type="text" id="editExpenseName" data-i18n="expenseName" placeholder="항목 이름" class="field-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="amount">금액</label>
                        <input type="number" id="editExpenseAmount" data-i18n="amount" placeholder="금액" min="0" class="field-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="payer">지불한 사람</label>
                        <select id="editExpensePayer" class="field-input"></select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="memo">메모</label>
                        <textarea id="editExpenseMemo" data-i18n="memo" placeholder="메모 (선택사항)" rows="3" class="field-input field-textarea"></textarea>
                    </div>
                    <div class="modal-actions">
                        <button onclick="saveExpenseChanges()" class="btn-modal-primary" data-i18n="save">저장</button>
                        <button onclick="closeExpenseModal()" class="btn-modal-secondary" data-i18n="cancel">취소</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 확인 모달 -->
    <div id="confirmModal" class="modal" style="display:none;">
        <div class="modal-backdrop" onclick="closeConfirmModal()"></div>
        <div class="modal-sheet modal-sheet-sm">
            <div class="modal-handle"></div>
            <div class="modal-body confirm-body">
                <div class="confirm-icon">⚠️</div>
                <h3 id="confirmTitle" data-i18n="confirm">확인</h3>
                <p id="confirmMessage" class="confirm-message">정말로 실행하시겠습니까?</p>
                <div class="modal-actions">
                    <button onclick="confirmAction()" class="btn-modal-danger" data-i18n="confirm">확인</button>
                    <button onclick="closeConfirmModal()" class="btn-modal-secondary" data-i18n="cancel">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
